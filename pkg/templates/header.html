<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
</head>
<body>
   <div class="container-fluid">
    <div class="row">
         <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
      <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('home') }}">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="KayHomes logo" class="d-inline-block align-text-top navbar-logo">
          <span class="fw-bold text-primary fs-5"></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-lg-center">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('properties') }}">Properties</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('about') }}">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('contact') }}">Contact</a>
            </li>
            
<!-- examples i intentionally divided it  -->
          {% if session.get('username') %}
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              My Account
            </a>
            <ul class="dropdown-menu shadow-sm">
              <li><a class="dropdown-item" href="{{ url_for('dashboard') }}">User Dashboard</a></li>
              <li><a class="dropdown-item" href="#">My Favorites</a></li>
              <li><a class="dropdown-item" href="#">Saved Search</a></li>
              <li><a class="dropdown-item" href="{{ url_for('user') }}">Account Settings</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="{{ url_for('login') }}">Sign Out</a></li>
            </ul>
          </li>
        {% else %}
          <div class="d-flex ms-lg-3 mt-3 mt-lg-0">
            <a class="btn btn-outline-primary me-2" href="{{ url_for('login') }}">Sign In</a>
            <a class="btn btn-primary" href="{{ url_for('register') }}">Sign Up</a>
          </div>
        {% endif %}
        </div>
      </div>
    </nav>
    </div>
   </div>
</body>
</html>
