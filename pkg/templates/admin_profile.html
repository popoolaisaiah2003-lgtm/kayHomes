{% extends 'base.html' %}

{% block title %}Admin Profile - KayHomes{% endblock %}

{% block main_content %}
<div class="container py-5 fade-up">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0">Admin Profile</h3>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
  </div>

  <div class="property-form-shell">
    <form method="POST" enctype="multipart/form-data" class="row g-3">
      <input type="hidden" name="csrf_token" value="{{ admin_csrf_token }}">
      <div class="col-md-6">
        <label class="form-label">First Name</label>
        <input type="text" name="first_name" class="form-control" value="{{ profile.first_name }}" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Last Name</label>
        <input type="text" name="last_name" class="form-control" value="{{ profile.last_name }}" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" value="{{ profile.username }}" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ profile.email }}" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Phone Number</label>
        <input type="text" name="phone" class="form-control" value="{{ profile.phone }}">
      </div>

      <div class="col-12">
        <label class="form-label">Profile Picture</label>
        <input type="file" name="profile_image" accept=".jpg,.jpeg,.png,.webp" class="form-control">
        {% if profile.profile_image %}
          <div class="mt-3">
            <img src="{{ url_for('static', filename=profile.profile_image) }}" alt="Admin profile picture" class="rounded" style="width:90px; height:90px; object-fit:cover;">
          </div>
        {% endif %}
      </div>

      <div class="col-12 d-flex justify-content-end">
        <button type="submit" class="btn btn-primary">Save Profile</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
