{% extends 'base.html' %}

{% block title %}Edit Admin - KayHomes{% endblock %}

{% block main_content %}
<div class="container py-5 fade-up">
  <div class="d-flex justify-content-between align-items-center mb-4 gap-3">
    <div>
      <h2 class="mb-1">Edit Admin</h2>
      <p class="text-muted mb-0">Update administrator account details.</p>
    </div>
    <a href="{{ url_for('admin_management') }}" class="btn btn-outline-secondary btn-sm">Back to Management</a>
  </div>

  <div class="property-form-shell">
    <form method="POST" enctype="multipart/form-data" class="row g-3">
      <input type="hidden" name="csrf_token" value="{{ admin_csrf_token }}">
      <div class="col-md-6">
        <label class="form-label">First Name</label>
        <input type="text" name="first_name" class="form-control" value="{{ form_data.first_name }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Last Name</label>
        <input type="text" name="last_name" class="form-control" value="{{ form_data.last_name }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" value="{{ form_data.username }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ form_data.email }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ form_data.phone }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Status</label>
        <select name="status" class="form-select">
          <option value="Active" {% if form_data.status == 'Active' %}selected{% endif %}>Active</option>
          <option value="Inactive" {% if form_data.status == 'Inactive' %}selected{% endif %}>Inactive</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Profile Picture</label>
        <input type="file" name="profile_image" accept=".jpg,.jpeg,.png,.webp" class="form-control">
        {% if admin.profile_image %}
          <div class="mt-3">
            <img src="{{ url_for('static', filename=admin.profile_image) }}" alt="Admin profile picture" class="rounded" style="width:90px; height:90px; object-fit:cover;">
          </div>
        {% endif %}
      </div>
      <div class="col-12 d-flex justify-content-end gap-2">
        <a href="{{ url_for('admin_management') }}" class="btn btn-outline-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
