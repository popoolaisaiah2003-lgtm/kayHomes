{% extends 'base.html' %}

{% block title %}Reset Admin Password - KayHomes{% endblock %}

{% block main_content %}
<div class="container py-5 fade-up">
  <div class="d-flex justify-content-between align-items-center mb-4 gap-3">
    <div>
      <h2 class="mb-1">Reset Password</h2>
      <p class="text-muted mb-0">Set a new password for {{ admin.first_name }} {{ admin.last_name }}.</p>
    </div>
    <a href="{{ url_for('admin_management') }}" class="btn btn-outline-secondary btn-sm">Back to Management</a>
  </div>

  <div class="property-form-shell">
    <form method="POST" class="row g-3">
      <input type="hidden" name="csrf_token" value="{{ admin_csrf_token }}">
      <div class="col-12">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password" class="form-control" minlength="8" required>
      </div>
      <div class="col-12">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" minlength="8" required>
      </div>
      <div class="col-12 d-flex justify-content-end gap-2">
        <a href="{{ url_for('admin_management') }}" class="btn btn-outline-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Reset Password</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
