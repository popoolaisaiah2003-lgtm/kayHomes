{% extends 'base.html' %}

{% block title %}Register - KayHomes{% endblock %}

{% block main_content %}
<div class="register-page-container">
  <div class="container py-5">
    <div class="row g-4 align-items-center fade-up">
      <div class="col-lg-6 d-none d-lg-block">
        <img src="{{ url_for('static', filename='images/img1.png') }}"
          class="img-fluid rounded-4 w-100"
          style="height: 700px; object-fit: cover;"
          alt="Modern apartment living room">
      </div>

      <div class="col-lg-6">
        <form action="{{ url_for('register') }}" method="POST" class="register-form">
          <h2 class="mb-2">Create an Account</h2>
          <p class="text-muted mb-4">Join KayHomes and start discovering premium properties.</p>

          <div class="row g-3">
            <div class="col-md-6">
              <label for="fname" class="form-label">First Name</label>
              <input id="fname" type="text" name="fname" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label for="lname" class="form-label">Last Name</label>
              <input id="lname" type="text" name="lname" class="form-control" required>
            </div>

            <div class="col-12">
              <label for="email" class="form-label">Email address</label>
              <input id="email" type="email" name="email" class="form-control" placeholder="Enter your email address" required>
            </div>

            <div class="col-12">
              <label for="phone" class="form-label">Phone Number</label>
              <input id="phone" type="tel" name="phone" class="form-control" placeholder="Enter your phone number">
            </div>

            <div class="col-md-6">
              <label for="password" class="form-label">Password</label>
              <input id="password" type="password" name="password" class="form-control" placeholder="Create a password" minlength="8" required>
            </div>

            <div class="col-md-6">
              <label for="confirm-password" class="form-label">Confirm Password</label>
              <input id="confirm-password" type="password" name="confirm_password" class="form-control" placeholder="Confirm your password" minlength="8" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 mt-4">Register</button>

          <p class="text-center mt-3 mb-0">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
