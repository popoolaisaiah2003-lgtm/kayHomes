<div class="container-fluid">
  <div class="row">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
      <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('home') }}">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="KayHomes logo" class="d-inline-block align-text-top navbar-logo">
          <span class="fw-bold text-primary fs-5"></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

          {% if session.get('user_id') %}

          <ul class="navbar-nav ms-auto align-items-lg-center">
            <li class="nav-item">
              <a class="nav-link active" href="{{ url_for('home') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('properties') }}">Properties</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('about') }}">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('contact') }}">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('messages') }}">
                Messages
                {% if unread_count and unread_count > 0 %}
                  <span class="badge bg-danger ms-1">{{ unread_count }}</span>
                {% endif %}
              </a>
            </li>

            <li class="nav-item dropdown ms-3">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Hello, {{ session.get('user_name') }}</a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="{{ url_for('user_dashboard') }}">Dashboard</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="{{ url_for('logout') }}">Logout</a></li>
              </ul>
            </li>
          </ul>

          {% else %}

          <div class="d-flex ms-auto">
            <a class="btn btn-outline-primary me-2" href="{{ url_for('login') }}">Sign In</a>
            <a class="btn btn-primary" href="{{ url_for('register') }}">Sign Up</a>
          </div>

          {% endif %}

        </div>
      </div>
    </nav>
  </div>
</div>
